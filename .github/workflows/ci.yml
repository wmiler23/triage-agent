name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install deps
        run: |
          pip install -r app/requirements.txt
          pip install pytest

      - name: Unit tests
        run: PYTHONPATH=. pytest -q

      # --- DevSecOps: shift security left -------------------------
      - name: Dependency + secret + IaC scan (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"          # fail the build on high/critical findings
      # ------------------------------------------------------------

      - name: Package Lambda artifact
        run: |
          mkdir -p build/app
          cp -r app build/
          (cd build && zip -r ../triage-agent.zip app)

      - name: Upload artifact for later jobs
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: triage-agent.zip