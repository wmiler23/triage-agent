name: cd

on:
  push:
    branches: ["main"]

permissions:
  id-token: write      # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_key: ${{ steps.pack.outputs.key }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r app/requirements.txt && pip install pytest
      - run: PYTHONPATH=. pytest -q

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build + publish ONE artifact
        id: pack
        run: |
          KEY="triage-agent-${GITHUB_SHA}.zip"
          mkdir -p build && cp -r app build/
          (cd build && zip -r ../$KEY app)
          aws s3 cp "$KEY" "s3://${{ vars.ARTIFACT_BUCKET }}/$KEY"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

  # A reusable deploy job is cleaner, but spelling out the four
  # environments makes the promotion sequence obvious for learning.
  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    permissions: { id-token: write, contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply (dev)
        run: |
          cd infra
          terraform init \
            -backend-config="bucket=${{ vars.TFSTATE_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform apply -auto-approve \
            -var-file=envs/dev.tfvars \
            -var="artifact_bucket=${{ vars.ARTIFACT_BUCKET }}" \
            -var="artifact_key=${{ needs.build.outputs.artifact_key }}"

  deploy-integration:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: integration
    permissions: { id-token: write, contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply (integration)
        run: |
          cd infra
          terraform init \
            -backend-config="bucket=${{ vars.TFSTATE_BUCKET }}" \
            -backend-config="key=integration/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform apply -auto-approve \
            -var-file=envs/integration.tfvars \
            -var="artifact_bucket=${{ vars.ARTIFACT_BUCKET }}" \
            -var="artifact_key=${{ needs.build.outputs.artifact_key }}"

  deploy-staging:
    needs: deploy-integration
    runs-on: ubuntu-latest
    environment: staging        # ← protection rule adds manual approval
    permissions: { id-token: write, contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply (staging)
        run: |
          cd infra
          terraform init \
            -backend-config="bucket=${{ vars.TFSTATE_BUCKET }}" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform apply -auto-approve \
            -var-file=envs/staging.tfvars \
            -var="artifact_bucket=${{ vars.ARTIFACT_BUCKET }}" \
            -var="artifact_key=${{ needs.build.outputs.artifact_key }}"

  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production     # ← protection rule adds manual approval
    permissions: { id-token: write, contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply (prod)
        run: |
          cd infra
          terraform init \
            -backend-config="bucket=${{ vars.TFSTATE_BUCKET }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform apply -auto-approve \
            -var-file=envs/prod.tfvars \
            -var="artifact_bucket=${{ vars.ARTIFACT_BUCKET }}" \
            -var="artifact_key=${{ needs.build.outputs.artifact_key }}"